here<!DOCTYPE html>
<html lang="ar" dir="rtl"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="user-scalable=yes">
    <meta name="referrer" content="no-referrer">
    <title> MY TV </title>
    
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4caac9">
    <link rel="apple-touch-icon" href="icon-192.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&amp;display=swap" rel="stylesheet">

    <style>
        body { margin: 0; background-color: #1a1a1a; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; transition: 0.3s; color: #fff; }
        
        /* ستايل اللوجو مع أنيميشن نتفليكس */
        .netflix-logo {
            font-family: 'Bebas Neue', sans-serif;
            color: #E50914;
            font-size: 65px;
            margin: 10px auto;
            text-transform: uppercase;
            display: inline-block;
            cursor: default;
            /* تشغيل الأنيميشن */
            animation: netflixIntro 2.5s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
        }

        /* تفاصيل حركة اللوجو */
        @keyframes netflixIntro {
            0% {
                transform: scale(1.8) scaleY(1.5);
                opacity: 0;
                filter: blur(12px);
                letter-spacing: -10px;
                text-shadow: 0 0 50px rgba(229, 9, 20, 1);
            }
            40% {
                opacity: 1;
                filter: blur(0px);
            }
            100% {
                transform: scale(1) scaleY(1.15);
                letter-spacing: 4px;
                text-shadow: 0 4px 12px rgba(229, 9, 20, 0.4);
            }
        }
        /* ستايل الشريط العلوي المجمع - مبقاش ثابت عشان مياخدش الشاشة */
        .top-nav-bar {
            background: #111;
            padding: 15px 10px;
            border-bottom: 2px solid #4caac9; 
            width: 100%;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 10px;
            position: relative; /* تم إلغاء الثبات */
            z-index: 10;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.6);
        }
        body.light-theme .top-nav-bar {
            background: rgba(255, 255, 255, 0.95);
            box-shadow: 0px 4px 15px rgba(0,0,0,0.1);
        }

        .control-group { display: flex; justify-content: center; flex-wrap: wrap; gap: 10px; padding: 0 10px; }
        
        .cat-btn { background-color: #222; color: #fff; border: 1px solid #4caac9; padding: 10px 15px; border-radius: 25px; cursor: pointer; font-weight: bold; transition: all 0.3s; font-size: 14px; white-space: nowrap; }
        .cat-btn:hover, .active-cat { background-color: #4caac9; color: #000; }
        .match-btn { border-color: #ff4757 !important; color: #ff4757; position: relative; } 
        .match-btn:hover { background-color: #ff4757 !important; color: #fff !important; }
        .tool-btn { border-color: #f39c12 !important; color: #f39c12; }
        .tool-btn:hover { background-color: #f39c12 !important; color: #000 !important; }

        .search-sort-container { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; margin: 0 auto 20px auto; width: 90%; max-width: 600px; align-items: center; }
        #searchInput { flex: 1; min-width: 150px; padding: 12px; border-radius: 25px; border: 2px solid #4caac9; background: #222; color: white; text-align: center; font-size: 16px; outline: none; }
        #sortSelect { padding: 12px; border-radius: 25px; border: 2px solid #4caac9; background: #222; color: white; text-align: center; font-size: 16px; outline: none; cursor: pointer; }
        #viewToggleBtn { padding: 12px 20px; border-radius: 25px; border: 2px solid #4caac9; background: #222; color: white; outline: none; cursor: pointer; font-size: 16px; font-weight: bold; transition: 0.3s; }
        #viewToggleBtn:hover { background: #4caac9; color: #000; }

        #adhkar-ticker { background: linear-gradient(90deg, #111, #222, #111); color: #ffeb3b; padding: 12px; margin: 15px auto; width: 90%; max-width: 600px; border-radius: 8px; border: 1px solid #4caac9; font-size: 18px; font-weight: bold; box-shadow: 0 4px 8px rgba(0,0,0,0.5); }
        #adhkar-text { display: inline-block; transition: opacity 0.5s ease-in-out; opacity: 1; }

        .scores-wrap { display: flex; width: 90%; max-width: 600px; margin: 0 auto 15px auto; border-radius: 8px; overflow: hidden; border: 1px solid #e74c3c; box-shadow: 0 4px 8px rgba(0,0,0,0.5); }
        .scores-title { background: #e74c3c; color: #fff; padding: 12px; font-weight: bold; font-size: 16px; white-space: nowrap; z-index: 2; display: flex; align-items: center;}
        .scores-marquee { background: #111; color: #fff; padding: 12px; font-weight: bold; font-size: 16px; flex: 1; display: flex; align-items: center; border-right: 2px solid #e74c3c;}

        #media-wrapper { 
            position: relative; 
            max-width: 1000px; 
            margin: 20px auto; 
            background: transparent; 
            display: none; 
            flex-direction: column; 
            align-items: center;
            box-shadow: none; 
            border: none;
        }

        .player-controls { 
            position: relative; 
            top: 0; 
            width: 100%; 
            display: flex; 
            gap: 8px; 
            flex-wrap: wrap; 
            justify-content: center; 
            margin-bottom: 12px; 
            z-index: 9999; 
        }

        #my-player, #iframe-player { 
            position: relative; 
            width: 100%; 
            height: auto;
            aspect-ratio: 16 / 9; 
            background: #000; 
            border-radius: 10px; 
            border: 2px solid #4caac9; 
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }
        
        .hidden { display: none !important; }

        .tv-spinner {
            border: 4px solid rgba(255,255,255,0.2); border-top: 4px solid #e74c3c;
            border-radius: 50%; width: 45px; height: 45px; animation: spin 1s linear infinite;
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 10000;
        }
        @keyframes spin { 0% { transform: translate(-50%, -50%) rotate(0deg); } 100% { transform: translate(-50%, -50%) rotate(360deg); } }

        #quality-badge, #stream-status, #quality-selector {
            position: absolute;
            z-index: 9999;
            top: 60px; 
        }
        #quality-badge { left: 15px; background: rgba(0, 0, 0, 0.7); color: rgb(0, 255, 204); border: 1px solid rgb(0, 255, 204); padding: 6px 12px; border-radius: 6px; font-weight: bold; font-size: 14px; }
        #stream-status { left: 50%; transform: translateX(-50%); background: rgba(0, 0, 0, 0.8); padding: 6px 15px; border-radius: 20px; font-weight: bold; font-size: 15px; }
        
        #quality-selector {
            left: 15px;
            background: rgba(0, 0, 0, 0.7);
            color: rgb(0, 255, 204);
            border: 1px solid rgb(0, 255, 204);
            padding: 6px 12px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 14px;
            outline: none;
            cursor: pointer;
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
        }
        #quality-selector option { background: #222; color: #fff; }

        body.theater-active { overflow: hidden; }
        .theater-mode { 
            position: fixed !important; top: 0 !important; left: 0 !important; 
            width: 100vw !important; height: 100vh !important; 
            max-width: none !important; margin: 0 !important; 
            z-index: 99999 !important; background: #000 !important; 
        }
        .theater-mode .player-controls { 
            position: absolute !important; 
            top: 15px !important; right: 15px !important; 
            width: auto !important; 
        }
        .theater-mode #my-player, .theater-mode #iframe-player {
            height: 100vh !important; border-radius: 0 !important; border: none !important;
        }

        .pinned-player { position: fixed !important; bottom: 20px !important; right: 20px !important; left: auto !important; top: auto !important; width: 350px !important; height: auto !important; z-index: 999999 !important; margin: 0 !important; }
        @media (max-width: 480px) { .pinned-player { width: 250px !important; } }
        .pinned-player .player-controls { display: none !important; } 

        /* ستايل برواز القنوات متظبط */
        #main-list {
            display: grid !important;
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)) !important;
            gap: 15px !important;
            padding: 20px !important;
            background: #111 !important; 
            border: 2px solid #4caac9 !important; 
            border-radius: 15px !important;
            box-sizing: border-box !important;
            margin: 20px auto;
            width: 95%;
            max-width: 1200px;
            box-shadow: 0 0 15px rgba(76, 170, 201, 0.3) !important;
        }
        body.light-theme #main-list { background-color: rgba(255,255,255,0.9) !important; }

        #main-list .tv-box, #main-list .match-btn {
            position: relative !important;
            display: flex !important;
            flex-direction: column !important;
            align-items: center !important;
            justify-content: flex-end !important; 
            width: 100% !important;
            height: 110px !important; 
            margin: 0 !important;
            padding: 10px !important;
            background-color: #1e1e24 !important;
            border: 1px solid rgba(255, 255, 255, 0.05) !important;
            border-radius: 16px !important; 
            color: #ffffff !important;
            font-family: 'Segoe UI', Tahoma, sans-serif !important;
            font-size: 13px !important;
            font-weight: 600 !important;
            text-align: center !important;
            text-decoration: none !important;
            cursor: pointer !important;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3) !important; 
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1) !important;
            overflow: hidden !important;
            text-shadow: 1px 1px 4px rgba(0, 0, 0, 0.9) !important; 
            background-size: 55% !important; 
            background-repeat: no-repeat !important;
            background-position: center 25% !important; 
        }

        #main-list .tv-box:hover, #main-list .match-btn:hover {
            transform: translateY(-6px) scale(1.03) !important; 
            box-shadow: 0 12px 20px rgba(0, 210, 211, 0.3) !important; 
            border-color: rgba(0, 210, 211, 0.5) !important;
            background-color: #2a2d34 !important;
            z-index: 10 !important;
        }

        #main-list .active-channel { 
            border-color: #ff0000 !important; 
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.7) !important; 
        }
        
        #main-list .fav-icon-star {
            position: absolute !important;
            top: 8px !important;
            right: 8px !important;
            font-size: 18px !important;
            line-height: 1 !important;
            color: rgba(255, 255, 255, 0.2) !important; 
            transition: color 0.3s ease, transform 0.3s ease !important;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.8) !important;
            z-index: 2 !important;
            background: transparent !important;
            border: none !important;
            width: auto !important;
            height: auto !important;
        }

        #main-list .is-fav .fav-icon-star, #main-list .fav-icon-star:hover {
            color: #ffc107 !important; 
            text-shadow: 0 0 10px rgba(255, 193, 7, 0.6) !important; 
            transform: scale(1.2) !important;
        }

        .tv-container.list-view {
            display: flex !important;
            flex-direction: column;
            padding: 20px !important; /* مساحة للبرواز */
            background-color: #111 !important;
        }
        .tv-container.list-view .tv-box, 
        .tv-container.list-view .match-btn {
            width: 100% !important;
            height: auto !important;
            min-height: 60px;
            border-radius: 10px !important;
            display: flex !important;
            flex-direction: row-reverse !important;
            justify-content: flex-end !important;
            align-items: center !important;
            padding: 10px 20px !important;
            box-sizing: border-box;
            margin-bottom: 8px !important;
            font-size: 16px !important;
            background-position: left 15px center !important;
            background-size: 40px !important;
        }
        body.light-theme .tv-container.list-view .tv-box, body.light-theme .tv-container.list-view .match-btn { background-color: #fff !important; color: #111 !important; }
        .tv-container.list-view .fav-icon-star {
            top: 50% !important;
            transform: translateY(-50%) !important;
            right: 15px !important;
            left: auto !important;
        }

        .theme-toggle-btn { background: rgba(255,255,255,0.08); color: #fff; border: 2px solid #4caac9; border-radius: 12px; padding: 10px 16px; cursor: pointer; font-weight: bold; transition: 0.3s ease; }
        body.light-theme { background: linear-gradient(180deg, #f6fbff 0%, #eaf4fb 100%); color: #111; }
        body.light-theme h2, body.light-theme #live-clock { color: #111 !important; text-shadow: none !important; }
        body.light-theme .cat-btn:not(#main-list .cat-btn), body.light-theme .theme-toggle-btn, body.light-theme #searchInput, body.light-theme #sortSelect, body.light-theme #viewToggleBtn { background: #fff !important; color: #111 !important; border-color: #4caac9 !important; }
        body.light-theme .active-cat { background: #4caac9 !important; color: #000 !important; }
        
        #toast { visibility: hidden; min-width: 250px; background-color: #333; color: #fff; text-align: center; border-radius: 8px; padding: 16px; position: fixed; z-index: 9999999; left: 50%; bottom: 30px; transform: translateX(-50%); font-size: 16px; font-weight: bold; box-shadow: 0px 4px 10px rgba(0,0,0,0.5); border: 1px solid #4caac9; }
        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 100000; backdrop-filter: blur(5px); }
        .modal-content { background: #222; padding: 20px; border-radius: 12px; width: 90%; max-width: 450px; border: 2px solid #4caac9; color: #fff; text-align: right; box-shadow: 0 10px 25px rgba(0,0,0,0.8); }
        body.light-theme .modal-content { background: #fff; color: #111; }
        .modal-content input { width: 100%; padding: 10px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #4caac9; background: #333; color: #fff; box-sizing: border-box; }
        body.light-theme .modal-content input { background: #f9f9f9; color: #111; }
        .modal-btn { padding: 10px; border-radius: 8px; cursor: pointer; border: none; font-weight: bold; transition: 0.3s; width: 48%; }
        
        footer { background-color: #333; padding: 20px; text-align: center; color: #fff; margin-top: 40px; border-top: 3px solid #4caac9; }
        #scrollTopBtn { display: none; position: fixed; bottom: 20px; left: 20px; z-index: 9999; background: #4caac9; color: #000; border: none; width: 45px; height: 45px; border-radius: 50%; font-size: 24px; cursor: pointer; }
    </style>

<body class="">

    <div class="top-nav-bar">
        <div class="control-group">
            <button onclick="filterChannels('all')" class="cat-btn active-cat" style="direction: rtl;">🌐 الكل</button>
            
            
            
            <button onclick="playVideo(null, 'https://www.filgoal.com/matches/')" class="cat-btn match-btn" style="display: inline-flex; direction: rtl;">⚽️ مباريات اليوم<div class="fav-icon-star" title="المفضلة">★</div></button>
            <button onclick="window.open('https://radioe.ct.ws/app/index.html#station')" class="cat-btn match-btn" style="display: inline-flex; direction: rtl;">📻 راديو و اذاعة<div class="fav-icon-star" title="المفضلة">★</div></button>
            <button onclick="playVideo(null, 'https://timesprayer.com/')" class="cat-btn match-btn" style="display: inline-flex; direction: rtl;">🕌 مواقيت الصلاة<div class="fav-icon-star" title="المفضلة">★</div></button>
            <button onclick="window.open('https://qiblafinder.withgoogle.com/intl/ar/desktop', '_blank')" class="cat-btn match-btn" style="display: inline-flex; direction: rtl;">🧭 القبلة<div class="fav-icon-star" title="المفضلة">★</div></button>
            <button onclick="playVideo(null, 'https://www.i2arabic.com/newspapers/egyptian-newspapers')" class="cat-btn match-btn" style="display: inline-flex; direction: rtl;"> صحف واخبار <div class="fav-icon-star" title="المفضلة">★</div></button>
            <button onclick="filterChannels('fav')" class="cat-btn active-cat" style="border-color: rgb(255, 235, 59); color: rgb(255, 235, 59); direction: rtl;">⭐ مفضلتي</button>
        </div>

        <div class="control-group">
            <button onclick="openFetcherModal()" class="cat-btn tool-btn" style="border-color: rgb(46, 204, 113); color: rgb(46, 204, 113); direction: rtl;">🧲 جلب Iframes</button>
            <button id="editModeBtn" onclick="toggleEditMode()" class="cat-btn tool-btn" style="border-color: rgb(241, 196, 15); color: rgb(241, 196, 15); direction: rtl; background: transparent;">✏️ وضع التعديل</button>
            <button id="duplicateModeBtn" onclick="toggleDuplicateMode()" class="cat-btn tool-btn" style="border-color: rgb(155, 89, 182); color: rgb(155, 89, 182); direction: rtl; background: transparent;">📋 وضع النسخ</button>
            <button onclick="openEditFullListModal()" class="cat-btn tool-btn" style="border-color: #3498db; color: #3498db; direction: rtl; background: transparent;">📝 تعديل كود القنوات</button>
            <button onclick="openMatchesModal()" class="cat-btn tool-btn" style="border-color: rgb(0, 210, 211); color: rgb(0, 210, 211); direction: rtl;">📅 جدول المباريات</button>
            <button onclick="openIptvModal()" class="cat-btn tool-btn" style="border-color: #9b59b6; color: #9b59b6; direction: rtl; background: transparent;">📡 سحب IPTV يدوي</button>
            <button onclick="openExternalModal()" class="cat-btn tool-btn" style="border-color: #ff9f43; color: #ff9f43; direction: rtl; background: transparent;">🔗 تشغيل رابط خارجي</button>
